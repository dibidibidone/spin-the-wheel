<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_7');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

void main() {
    vec2 uv = (v_texCoord - 0.5) * 2.0;
    float angle = atan(uv.y, uv.x);
    float dist = length(uv);
    
    // Rotating gold rays
    float rays = sin(angle * 12.0 + u_time * 1.5) * 0.5 + 0.5;
    vec3 gold = vec3(0.96, 0.76, 0.29);
    vec3 lightGold = vec3(1.0, 0.9, 0.6);
    
    vec3 color = mix(gold * 0.2, lightGold, rays * (1.0 - dist * 0.8));
    
    // Central green "BOOM" energy burst
    float burst = exp(-dist * 4.0) * (sin(u_time * 10.0) * 0.2 + 0.8);
    vec3 greenEnergy = vec3(0.35, 0.89, 0.42);
    
    color += greenEnergy * burst * 1.5;
    
    // Add some glimmer/sparkle
    float glimmer = pow(sin(uv.x * 20.0 + u_time) * sin(uv.y * 20.0 - u_time), 10.0);
    color += lightGold * glimmer * (1.0 - dist);

    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();

<!-- Vanilla JS Coin Rain Animation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('coin-canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let coins = [];
            const numCoins = 40; // Number of coins falling
            
            // Set canvas size to match window
            function resize() {
                // Constrain to mobile width logic if on desktop
                const isDesktop = window.innerWidth > 448;
                width = isDesktop ? 448 : window.innerWidth;
                height = window.innerHeight;
                canvas.width = window.innerWidth; // Keep canvas full width but draw inside bounds
                canvas.height = height;
            }
            
            window.addEventListener('resize', resize);
            resize();

            class Coin {
                constructor() {
                    this.reset();
                    // Randomize initial Y to distribute them
                    this.y = Math.random() * height * -1;
                }

                reset() {
                    // Start above screen
                    this.y = -20;
                    
                    // Determine x position (constrained if on desktop)
                    const offset = (window.innerWidth - width) / 2;
                    this.x = offset + Math.random() * width;
                    
                    this.size = Math.random() * 8 + 4; // Radius
                    this.speed = Math.random() * 3 + 2;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                    
                    // Slightly varied gold colors
                    const golds = ['#F5C24B', '#FFD56A', '#D4A32C'];
                    this.color = golds[Math.floor(Math.random() * golds.length)];
                    
                    this.settled = false;
                }

                update() {
                    if (this.settled) return;

                    this.y += this.speed;
                    this.rotation += this.rotationSpeed;

                    // Settle at bottom (above nav bar roughly)
                    if (this.y > height - 80 - Math.random() * 40) {
                        this.settled = true;
                        
                        // Slowly remove and respawn from top to keep continuous rain
                        setTimeout(() => {
                            this.reset();
                        }, Math.random() * 5000 + 2000);
                    }
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    // Pseudo 3D rotation effect by scaling Y
                    const scaleY = Math.abs(Math.sin(this.rotation));
                    ctx.scale(1, scaleY);
                    
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    
                    // Inner ring
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.7, 0, Math.PI * 2);
                    ctx.strokeStyle = '#B8860B'; // Darker gold for detail
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }

            for (let i = 0; i < numCoins; i++) {
                coins.push(new Coin());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                coins.forEach(coin => {
                    coin.update();
                    coin.draw();
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
        });
    </script>
